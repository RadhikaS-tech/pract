<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flora</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #fffafc;
      color: #333;
    }

    header {
      background: #ff4d6d;
      color: white;
      text-align: center;
      padding: 1rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 8px;
      font-size: 0.9rem;
    }

    /* HERO */
    .hero {
      height: 60vh;
      background: url('https://images.unsplash.com/photo-1525310072745-f49212b5ac6d') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .hero h2 {
      position: relative;
      color: white;
      font-size: 1.6rem;
      text-align: center;
    }

    .section {
      padding: 2rem 1rem;
      text-align: center;
    }

    .section h2 {
      margin-bottom: 1.5rem;
      color: #ff4d6d;
    }

    /* CLEAN GRID */
    .flowers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .flower img {
      width: 100%;
      height: 180px;
      object-fit: cover;   /* THIS FIXES MESSY IMAGES */
      border-radius: 8px;
      display: block;
    }

    .flower p {
      margin-top: 5px;
      font-size: 0.85rem;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 1rem;
      margin-top: 1rem;
    }

    /* Desktop */
    @media (min-width: 700px) {
      .flowers {
        grid-template-columns: repeat(4, 1fr);
      }

      .flower img {
        height: 200px;
      }
    }
  </style>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3QWM80KQ7J"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-3QWM80KQ7J');
</script>

<body>

<header>
  <h1>Flora 🌸</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Flowers</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Fresh Flowers Delivered With Love</h2>
</section>

<section class="section">
  <h2>Our Flowers</h2>

  <div class="flowers">

    <div class="flower">
      <img src="https://static.vecteezy.com/system/resources/previews/050/819/242/large_2x/romantic-blooms-red-rose-background-free-photo.jpg" alt="">
      <p>Roses</p>
    </div>

    <div class="flower">
      <img src="https://m.media-amazon.com/images/I/71soQIzEeRL.jpg" alt="">
      <p>Tulips</p>
    </div>

    <div class="flower">
      <img src="https://cdn.flowersnfruits.com/uploads/product/flowers_n_fruits/OCT2024/1728455572006-MixFlowersBouquet.webp" alt="">
      <p>Mixed Bouquet</p>
    </div>

    <div class="flower">
      <img src="https://images.unsplash.com/photo-1470509037663-253afd7f0f51" alt="">
      <p>Sunflowers</p>
    </div>

    <div class="flower">
      <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946" alt="">
      <p>Fresh Flowers</p>
    </div>

    

  </div>
</section>

<section class="section">
  <h2>Contact</h2>
  <p>📍 Mumbai</p>
  <p>📞 +91 98765 43210</p>
</section>

<footer>
  <p>© Flora Flower Shop</p>
</footer>

</body>
</html>
